{% extends 'base.html' %}

{% block content %}

<section class="about-section">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-7">

                <div class="about-content">

                    <h2 class="section-title text-center mb-4">
                        Book With {{ employee.user.username }}
                    </h2>

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-4">

                            <label class="mb-2">
                                Services
                            </label>

                            {{ form.services }}

                        </div>

                        <div class="mb-4">

                            <label class="mb-2 ">
                                Date & Time
                            </label>

                            {{ form.date }}

                        </div>

                        <button
                            type="submit"
                            class="btn-hero w-100">

                            Confirm Appointment

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</section>

{% endblock %}
