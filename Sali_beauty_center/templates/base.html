{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Luxury beauty center booking system">
    <title>Sali Beauty Center</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="{% static 'images/sali_logo.svg' %}">
</head>
    
<body>
<nav class="navbar navbar-expand-lg navbar-dark">

    <div class="container">

        <!-- Logo -->
        <a class="navbar-brand d-flex align-items-center" href="{% url 'booking:home' %}">
            <img src="{% static 'images/sali_logo.svg' %}" alt="Logo" class="navbar-logo">
            <span class="logo-text">
                Back to Home
            </span>
        </a>

        <!-- Toggle (mobile) -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Links -->
        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">

            <ul class="navbar-nav align-items-center gap-3">

                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'services' %}active-link{% endif %}" href="{% url 'booking:services' %}">
                        Services
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'about' %}active-link{% endif %}" href="{% url 'booking:about' %}">
                    About Us
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">Login</a>
                </li>

                <li class="nav-item">
                    <a class="btn-register" href="#">Register</a>
                </li>

            </ul>

        </div>

    </div>
</nav>
<!-- CONTENT -->

    {% block content %}
    {% endblock %}
<!-- footer --> 
<footer class="footer mt-5 py-5">

    <div class="container text-center">

        <!-- Logo -->
        <div class="footer-logo mb-3">
            <img src="{% static 'images/sali_logo.svg' %}" alt="Sali Beauty Center">
        </div>

        <!-- Text -->
        <p class="footer-text">
            Luxury Beauty Center – Hair, Face & Nails Care
        </p>

        <!-- Copyright -->
        <p class="footer-copy">
            © 2026 Sali Beauty Center. All rights reserved.
        </p>

    </div>

</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- FLOATING CONTACT BAR -->
    <div class="floating-contact">
        
        <p> Contact <br> Us </p>
        <a href="#">
            📞
        </a>

        <a href="#">
            📷
        </a>

        <a href="#">
            📍
        </a>

        <a href="#">
            💬
        </a>

    </div>
</body>
</html>
